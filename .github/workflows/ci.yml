name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Electron syntax check
        run: |
          node -c electron/main.cjs
          node -c electron/preload.cjs

      - name: Script syntax check
        run: |
          node -c scripts/agent-e2e.js
          node -c scripts/agent-runner.js
          node -c scripts/browser-smoke.mjs
          node -c scripts/desktop-smoke.mjs
          node -c scripts/electron-builder-unsigned.mjs
          node -c scripts/health-check.js
          node -c scripts/mcp-cli.js
          node -c scripts/prepare-electron-build.mjs
          node -c scripts/prepare-playwright-browsers.mjs

      - name: Install Playwright Chromium
        run: npm run browsers:install

      - name: Browser smoke
        run: npm run browser:smoke

      - name: Health check
        run: npm run health
