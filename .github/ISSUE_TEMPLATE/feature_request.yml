name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Target area
      options:
        - Desktop shell
        - Browser/profile selection
        - Agent runtime
        - Model providers
        - MCP integration
        - UI/history
        - Documentation
        - Packaging/release
        - Other
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Provider or browser impact
      description: Mention any provider, local model, browser channel, or profile behavior this may affect.
    validations:
      required: false
